name: Code Quality

on:
  push:
    branches: [ develop ]
    paths:
      - 'src/**'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [ develop ]
    paths:
      - 'src/**'
      - '.github/workflows/code-quality.yml'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check code formatting
      run: npm run format:check
      
    - name: Run ESLint
      run: npm run lint